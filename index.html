<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- Explicit color scheme + hard-coded colors everywhere: prevents mobile
     dark-mode inversion breakage. Do not rely on UA default colors anywhere. -->
<meta name="color-scheme" content="dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230B0B14'/%3E%3Ctext x='2' y='12' font-family='monospace' font-size='10' fill='%237FD34E'%3E%3E_%3C/text%3E%3C/svg%3E">
<title>Single Point of Failure</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; height: 100%;
    background-color: #0B0B14; color: #E8E6DC;
    font-family: ui-monospace, "Cascadia Mono", Menlo, Consolas, "Liberation Mono", monospace;
    overflow: hidden;
  }

  /* Engine mounts here: canvas scene + DOM UI (terminal, verb strip, inventory).
     Portrait: scene on top, terminal below. Wide screens: scene left, terminal right. */
  #game { height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
  #scene {
    flex: 0 0 auto; width: 100%;
    height: min(56.25vw, 46vh); height: min(56.25vw, 46dvh);
    background-color: #000000;
  }
  #scene canvas {
    display: block; width: 100%; height: 100%;
    object-fit: contain; image-rendering: pixelated;
    background-color: #000000; touch-action: manipulation;
  }
  #ui {
    flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column;
    background-color: #0B0B14;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  @media (min-aspect-ratio: 4/3) {
    #game { flex-direction: row; }
    #scene { flex: 1 1 auto; width: auto; height: 100%; min-width: 0; }
    /* min-width: 0 so long content (room names, save strings) can never
       inflate the panel and silently shrink the scene. */
    #ui { flex: 0 0 clamp(280px, 38%, 440px); border-left: 1px solid #23233A; min-width: 0; }
  }

  /* Only the log flexes; every other UI row keeps its natural height. */
  .status, .suggest, .input-row, .verbs, .inv { flex: 0 0 auto; }

  .status {
    display: flex; justify-content: space-between; gap: 8px;
    padding: 5px 10px; font-size: 12px;
    background-color: #12121E; color: #8FA3B8;
    border-bottom: 1px solid #23233A;
    white-space: nowrap; overflow: hidden;
  }
  .status-score { color: #E8C34A; }

  .log {
    flex: 1 1 auto; min-height: 64px; overflow-y: auto;
    padding: 8px 10px; font-size: 14px; line-height: 1.45;
    background-color: #0B0B14;
    overscroll-behavior: contain;
  }
  .line { margin: 0 0 6px; white-space: pre-wrap; overflow-wrap: anywhere; }
  .line.cmd { color: #7FD34E; }
  .line.narrate { color: #E8E6DC; }
  .line.sys { color: #9090A8; }
  .line.shell { color: #9FD0FF; }
  .line.pts { color: #E8C34A; }
  .line.err { color: #FF7A7A; }

  .suggest {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 2px 8px 4px; align-content: flex-start;
  }
  .suggest:empty { display: none; }
  .suggest-chip {
    font: inherit; font-size: 13px; cursor: pointer;
    background-color: #1C1C2C; color: #B8D8F8;
    border: 1px solid #34344A; border-radius: 6px;
    padding: 3px 10px; touch-action: manipulation;
  }

  .input-row { display: flex; align-items: center; gap: 6px; padding: 4px 8px; }
  .prompt { color: #7FD34E; font-size: 16px; }
  .cmd-input {
    flex: 1 1 auto; min-width: 0; font: inherit; font-size: 16px;
    background-color: #0E0E1A; color: #E8E6DC; caret-color: #7FD34E;
    border: 1px solid #2A2A3E; border-radius: 6px; padding: 8px 10px;
    outline: none;
  }
  .cmd-input:focus { border-color: #4A7A3E; }
  .cmd-input::placeholder { color: #55556A; }
  .run {
    font: inherit; font-size: 14px; cursor: pointer;
    background-color: #1A2634; color: #9FD0FF;
    border: 1px solid #2E4A66; border-radius: 6px;
    padding: 8px 12px; touch-action: manipulation;
  }
  .clear {
    font: inherit; font-size: 14px; cursor: pointer;
    background-color: #1C1C2C; color: #9090A8;
    border: 1px solid #34344A; border-radius: 6px;
    padding: 8px 10px; touch-action: manipulation;
  }

  .verbs { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 8px; }
  .verb {
    flex: 1 1 auto; font: inherit; font-size: 13px; cursor: pointer;
    background-color: #1A2634; color: #9FD0FF;
    border: 1px solid #2E4A66; border-radius: 6px;
    padding: 8px 6px; touch-action: manipulation;
  }
  .verb:active, .run:active, .clear:active, .suggest-chip:active { background-color: #24384E; }

  .inv {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 4px 8px 8px;
  }
  .inv-label {
    color: #77778C; font-size: 12px; flex: 0 0 auto;
    font-family: inherit; background-color: transparent; border: none;
    padding: 3px 0; cursor: pointer; touch-action: manipulation;
  }
  .inv-label:active { color: #B8B8CC; }
  /* The open tray never eats more than ~two chip rows; past that it
     scrolls internally. Newest items render first (see ui.ts), so the
     working set stays inside the visible window as the pile grows. */
  .inv-chips {
    display: flex; flex-wrap: wrap; gap: 6px; min-width: 0;
    max-height: 76px; overflow-y: auto; overscroll-behavior: contain;
  }
  .inv.collapsed .inv-chips { display: none; }
  .inv-empty { color: #55556A; font-size: 13px; }
  .inv-chip {
    font: inherit; font-size: 13px; cursor: pointer; white-space: nowrap;
    background-color: #241A2E; color: #D8B8F0;
    border: 1px solid #4A2E5E; border-radius: 6px;
    padding: 3px 10px; touch-action: manipulation;
  }

  @media (pointer: coarse) {
    .verb, .run, .clear { min-height: 44px; }
    .suggest-chip, .inv-chip { min-height: 32px; }
  }

  /* Death screen: engine-level overlay (content supplies the punchline). */
  .death {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background-color: rgba(16, 0, 8, 0.94); padding: 24px;
  }
  .death[hidden] { display: none; }
  .death-box { max-width: 44ch; text-align: center; }
  .death-kicker { color: #FF5C5C; font-size: 13px; letter-spacing: 0.35em; margin-bottom: 10px; }
  .death-title { color: #FF9A9A; font-size: 20px; margin-bottom: 14px; }
  .death-text { color: #E8E6DC; font-size: 15px; line-height: 1.5; margin-bottom: 22px; }
  .death-retry {
    font: inherit; font-size: 14px; cursor: pointer;
    background-color: #2E1A1A; color: #FFB8B8;
    border: 1px solid #663E3E; border-radius: 6px;
    padding: 12px 16px; touch-action: manipulation;
  }

  /* Landscape phones (row layout, short viewport): landscape is the
     preferred phone layout — every saved pixel goes to the log's text
     budget. Chips shrink a notch but stay comfortably tappable. */
  @media (min-aspect-ratio: 4/3) and (max-height: 520px) {
    .status { padding: 3px 8px; font-size: 11px; }
    .log { font-size: 13px; line-height: 1.4; padding: 6px 8px; }
    .line { margin-bottom: 4px; }
    .suggest { padding: 2px 6px; }
    .suggest-chip { font-size: 12px; padding: 2px 8px; }
    .input-row { padding: 3px 6px; }
    .cmd-input { padding: 6px 8px; }
    .run, .clear { padding: 6px 10px; }
    .verbs { padding: 3px 6px; gap: 4px; }
    .verb { padding: 6px 4px; font-size: 12px; }
    .inv { padding: 3px 6px 6px; }
    .inv-chips { max-height: 40px; }
    .verb, .run, .clear { min-height: 38px; }
  }
</style>
</head>
<body>
<div id="game">
  <div id="scene"></div>
  <div id="ui"></div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
